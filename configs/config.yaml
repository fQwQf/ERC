# Default configuration for Fine-Grained Emotion Recognition

# Model Configuration
model:
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  max_length: 512
  use_flash_attention: false

# LoRA Configuration
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Retrieval Configuration
retrieval:
  embedding_model: "sentence-transformers/all-mpnet-base-v2"
  top_k: 3
  cache_dir: "./cache/retrieval"

# Data Configuration
data:
  datasets:
    - "empathetic"
    - "goemotions"
    - "meld"
  cache_dir: "./cache/data"
  max_history_length: 10
  train_file: "./cache/data/train_samples.json"
  val_file: "./cache/data/val_samples.json"
  test_file: "./cache/data/test_samples.json"

# Training Configuration
training:
  output_dir: "./outputs/checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  fp16: true
  gradient_checkpointing: true
  
  # Multi-task loss weights
  emotion_loss_weight: 1.0
  speaker_loss_weight: 0.3
  impact_loss_weight: 0.2

# DeepSpeed Configuration
deepspeed:
  enabled: true
  config_file: "./configs/deepspeed_config.json"

# Evaluation Configuration
evaluation:
  metrics:
    - "weighted_f1"
    - "macro_f1"
    - "accuracy"
  target_f1:
    empathetic: 0.65
    iemocap: 0.71
    meld: 0.69
    emory: 0.41
  confusion_matrix: true
  per_class_metrics: true

# Logging Configuration
logging:
  use_wandb: false
  wandb_project: "erc-fine-grained"
  tensorboard: true
  log_dir: "./outputs/logs"
